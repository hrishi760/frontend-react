name: Frontend SonarQube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend-react
        run: npm install

      - name: Run tests with coverage
        working-directory: frontend-react
        run: CI=true npm test -- --coverage

      - name: Build App
        working-directory: frontend-react
        run: npm run build

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
         command: test
         args: --file=frontend-react/package.json --severity-threshold=high
        env:
         SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
         projectBaseDir: frontend-react
         args: >
          -Dsonar.projectKey=hrishi760_frontend
          -Dsonar.organization=hrishi760
        env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
